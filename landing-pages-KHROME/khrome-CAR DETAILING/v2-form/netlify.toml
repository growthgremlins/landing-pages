[build]
  base = "v2-form"
  command = "find .. -maxdepth 1 -name '*.webp' ! -name 'DSC09715.webp' -exec cp {} . \\; ; find .. -maxdepth 1 -name '*.png' -exec cp {} . \\; ; find .. -maxdepth 1 -name '*.svg' -exec cp {} . \\; ; echo 'Assets copied'"
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

