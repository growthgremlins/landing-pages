<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Thank You — M4 Detailing</title>
  <meta name="robots" content="noindex, nofollow">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #0a0a0a;
      color: #d1d5db;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 32px;
    }

    .card {
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .checkmark {
      width: 56px;
      height: 56px;
      background: rgba(220, 38, 38, 0.12);
      border: 2px solid #dc2626;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .checkmark svg {
      width: 28px;
      height: 28px;
      stroke: #dc2626;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      text-shadow: 0 0px 30px rgba(220, 38, 38, 0.5);
    }

    p {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    p.sub {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #1f1f1f;
      margin: 28px 0;
    }

    .cta-link {
      display: inline-block;
      background: #dc2626;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 13px 28px;
      border-radius: 8px;
      letter-spacing: 0.02em;
    }

    .cta-link:active {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <img class="logo" src="/m4-logo.webp" alt="M4 Detailing logo">

  <div class="card">
    <div class="checkmark">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1>You're All Set!</h1>
    <p>We received your request and will be in touch shortly to confirm your appointment.</p>
    <p class="sub">Check your inbox — we may reach out by phone or email.</p>

    <hr class="divider">

    <a class="cta-link" href="/">Back to Home</a>
  </div>

</body>
</html>
